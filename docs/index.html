<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE Strategy Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--bg:#0f1420;--panel:#171d2b;--panel2:#1e2536;--line:#2a3346;--txt:#e6ebf5;--muted:#8a95ab;
    --accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--greenbg:#0f2a1c;--blue:#38bdf8;--bluebg:#0e2436;
    --amber:#f59e0b;--amberbg:#2a220c;--red:#ef4444;--redbg:#2b1414;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.4}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block}
  .status{font-size:12px;color:var(--muted);margin-left:auto}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
  .btn:hover{background:var(--accent2)} .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .wrap{max-width:1240px;margin:0 auto;padding:16px}
  .styles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .pill{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px}
  .pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .layout{display:grid;grid-template-columns:270px 1fr;gap:16px}
  @media(max-width:860px){.layout{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;font-weight:600}
  .fgroup{margin-bottom:15px} .fgroup label.lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .chip{display:inline-block;padding:5px 10px;border-radius:14px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-size:12px;margin:0 4px 5px 0}
  .chip.on{background:var(--bluebg);border-color:var(--blue);color:var(--blue)}
  input[type=text],input[type=number],select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:7px 9px;font-size:13px}
  .row2{display:flex;gap:8px}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .card .n{font-size:22px;font-weight:600} .card .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:auto;max-height:70vh}
  table{border-collapse:collapse;width:100%;font-size:13px;min-width:900px}
  thead th{position:sticky;top:0;background:var(--panel2);color:var(--muted);text-align:left;padding:10px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line)}
  thead th:hover{color:var(--txt)}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody tr:hover{background:var(--panel2)} .sym{font-weight:600}
  .tag{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500}
  .tag.high{background:var(--greenbg);color:var(--green)} .tag.close{background:var(--bluebg);color:var(--blue)}
  .tag.zone{background:var(--amberbg);color:var(--amber)} .tag.down{background:var(--redbg);color:var(--red)}
  .up{color:var(--green)} .down{color:var(--red)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .demoflag{background:var(--amberbg);color:var(--amber);padding:2px 8px;border-radius:10px;font-size:11px}
  .stratcount{font-size:11px;color:var(--muted);margin-left:6px}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span> NSE Strategy Scanner</h1>
  <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
  <button class="btn ghost" onclick="loadRemote(true)">Refresh</button>
  <button class="btn ghost" onclick="document.getElementById('file').click()">Load Excel</button>
  <span class="status" id="status">loading…</span>
</header>

<div class="wrap">
  <div class="styles" id="styles"></div>
  <div class="layout">
    <div class="panel">
      <h3>Filters</h3>
      <div class="fgroup"><label class="lbl">Strategy</label><div id="stratChips"></div></div>
      <div class="fgroup"><label class="lbl">Signal</label><div id="sigChips"></div></div>
      <div class="fgroup" id="rangeGroup"><label class="lbl">Rectangle range width (Swing)</label>
        <select id="rangeSel"><option value="">Any</option><option>Very narrow</option><option>Narrow</option><option>Medium</option><option>Wide</option></select>
      </div>
      <div class="fgroup"><label class="lbl">RSI Daily</label><div class="row2"><input type="number" id="rsiDmin" placeholder="min"><input type="number" id="rsiDmax" placeholder="max"></div></div>
      <div class="fgroup"><label class="lbl">RSI Monthly</label><div class="row2"><input type="number" id="rsiMmin" placeholder="min"><input type="number" id="rsiMmax" placeholder="max"></div></div>
      <div class="fgroup"><label class="lbl">Last day candle</label>
        <select id="dayCandle"><option value="">Any</option><option>Bullish</option><option>Bearish</option><option>Doji</option><option>Bullish Marubozu</option><option>Bearish Marubozu</option></select></div>
      <div class="fgroup"><label class="lbl">Price vs EMA</label>
        <span class="chip" data-ema="50">Above EMA 50</span><span class="chip" data-ema="200">Above EMA 200</span></div>
      <div class="fgroup"><label class="lbl">Min 7-day avg volume</label><input type="number" id="minVol" placeholder="e.g. 100000"></div>
      <div class="fgroup"><label class="lbl">Search symbol</label><input type="text" id="search" placeholder="e.g. TATA"></div>
      <button class="btn ghost" style="width:100%" onclick="resetFilters()">Reset filters</button>
      <div class="note" id="srcnote"></div>
    </div>
    <div>
      <div class="cards" id="cards"></div>
      <div class="tablewrap"><table id="tbl"><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>
    </div>
  </div>
</div>

ull,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZFSTEERING.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZODIACLOTH.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZOTA.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZSARACOM.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZUARI.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZUARIIND.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZYDUSLIFE.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null],["ZYDUSWELL.NS",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null]]};
const DATA_URL='data.json';
const AUTO_REFRESH_MIN=10;

// ---------- strategy engine ----------
function doji(prefix, candleField){
  return (g)=>{
    if(String(g(candleField))!=='Doji') return null;
    const ltp=+g('LTP');
    let cl=g(prefix+'_Close'); cl=cl!=null?+cl:(prefix==='PM'?+g('M23'):null);
    if(!isFinite(ltp)||cl==null||!isFinite(cl)) return null;
    const hi=g(prefix+'_High')!=null?+g(prefix+'_High'):null;
    let f50=g(prefix+'_Fib50'), f618=g(prefix+'_Fib618');
    f50=f50!=null?+f50:null; f618=f618!=null?+f618:null;
    let sig=null,ref=null;
    if(hi!=null&&ltp>=hi){sig='Above High';ref=hi;}
    else if(ltp>=cl){sig='Above Close';ref=cl;}
    else if(f50!=null&&f618!=null&&ltp>=f50&&ltp<=f618){sig='Golden Zone';ref=f50;}
    if(!sig) return null;
    return {signal:sig,ref:ref,gap:cl?(((ltp-cl)/cl)*100):null,range:null};
  };
}
function rect(maxCol,minCol,gmm,gmax,gmin){
  return (g)=>{
    const gu=g(gmax), gl=g(gmin); if(gu==null||gl==null) return null;
    const GU=+gu, GL=+gl, RNG=g(gmm)!=null?+g(gmm):null;
    const mx=g(maxCol)!=null?+g(maxCol):null, mn=g(minCol)!=null?+g(minCol):null;
    let sig=null,ref=null,gap=null;
    if(GU>0&&GU<=5){sig='Upper Breakout';ref=mx;gap=GU;}
    else if(GU<=0&&GU>=-2){sig='Near Upper';ref=mx;gap=GU;}
    else if(GL<0&&GL>=-5){sig='Lower Breakdown';ref=mn;gap=GL;}
    else if(GL>=0&&GL<=2){sig='Near Lower';ref=mn;gap=GL;}
    if(!sig) return null;
    return {signal:sig,ref:ref,gap:gap,range:RNG};
  };
}
const DOJI_SIG=['Above High','Above Close','Golden Zone'];
const RECT_SIG=['Upper Breakout','Near Upper','Lower Breakdown','Near Lower'];
const STRATEGIES=[
  {id:'p1',name:'Prev Month Doji Breakout',style:'Positional',signals:DOJI_SIG,run:doji('PM','Last_Month_Candle')},
  {id:'p2',name:'Prev Week Doji Breakout', style:'Positional',signals:DOJI_SIG,run:doji('PW','Last_Week_Candle')},
  {id:'p3',name:'Prev Day Doji Breakout',  style:'Positional',signals:DOJI_SIG,run:doji('PD','Last_Day_Candle')},
  {id:'s1',name:'23-Month Rect Breakout',  style:'Swing',signals:RECT_SIG,run:rect('M_Max_23','M_Min_23','M_Gap_Min_Max_%','M_Gap_Max_LTP_%','M_Gap_Min_LTP_%')},
  {id:'s2',name:'21-Week Rect Breakout',   style:'Swing',signals:RECT_SIG,run:rect('W_Max_21','W_Min_21','W_Gap_Min_Max_%','W_Gap_Max_LTP_%','W_Gap_Min_LTP_%')},
  {id:'s3',name:'21-Day Rect Breakout',    style:'Swing',signals:RECT_SIG,run:rect('D_Max_21','D_Min_21','D_Gap_Min_Max_%','D_Gap_Max_LTP_%','D_Gap_Min_LTP_%')},
];
const STYLES=['All','Scalping','Intraday','Swing','Positional'];
const SIG_ORDER={'Above High':0,'Upper Breakout':1,'Above Close':2,'Golden Zone':3,'Near Upper':4,'Near Lower':5,'Lower Breakdown':6};

let DATA=SAMPLE, COLS=SAMPLE.columns, ci={};
let state={style:'All',strats:{},sigs:{},ema:{},sortKey:'signal',sortDir:1,range:''};
STRATEGIES.forEach(s=>state.strats[s.id]=true);

function reindex(){ci={};COLS.forEach((c,i)=>ci[c]=i);}
function gv(row,n){return ci[n]==null?null:row[ci[n]];}
function bucket(r){ if(r==null)return null; if(r<=10)return'Very narrow'; if(r<=25)return'Narrow'; if(r<=50)return'Medium'; return'Wide';}

function activeStrats(){ return STRATEGIES.filter(s=>(state.style==='All'||s.style===state.style)&&state.strats[s.id]); }
function activeSignals(){ const set=[]; activeStrats().forEach(s=>s.signals.forEach(x=>{if(!set.includes(x))set.push(x);})); return set.sort((a,b)=>SIG_ORDER[a]-SIG_ORDER[b]); }

function buildStyles(){
  const el=document.getElementById('styles');el.innerHTML='';
  STYLES.forEach(s=>{const d=document.createElement('div');d.className='pill'+(state.style===s?' active':'');d.textContent=s;
    d.onclick=()=>{state.style=s;buildStyles();buildStratChips();buildSigChips();toggleRange();render();};el.appendChild(d);});
}
function buildStratChips(){
  const el=document.getElementById('stratChips');el.innerHTML='';
  const list=STRATEGIES.filter(s=>state.style==='All'||s.style===state.style);
  if(list.length===0){el.innerHTML='<div class="note">No strategies for this style yet. Positional and Swing have 3 each. Scalping/Intraday coming as you add them.</div>';return;}
  list.forEach(s=>{const c=document.createElement('span');c.className='chip'+(state.strats[s.id]?' on':'');c.innerHTML=s.name+' <span class="stratcount" id="sc_'+s.id+'"></span>';
    c.onclick=()=>{state.strats[s.id]=!state.strats[s.id];buildStratChips();buildSigChips();render();};el.appendChild(c);});
}
function buildSigChips(){
  const el=document.getElementById('sigChips');el.innerHTML='';
  activeSignals().forEach(s=>{if(state.sigs[s]===undefined)state.sigs[s]=true;
    const c=document.createElement('span');c.className='chip'+(state.sigs[s]?' on':'');c.textContent=s;
    c.onclick=()=>{state.sigs[s]=!state.sigs[s];buildSigChips();render();};el.appendChild(c);});
}
function toggleRange(){ document.getElementById('rangeGroup').style.display=(state.style==='All'||state.style==='Swing')?'block':'none'; }
document.querySelectorAll('[data-ema]').forEach(ch=>{ch.onclick=()=>{const k=ch.dataset.ema;state.ema[k]=!state.ema[k];ch.classList.toggle('on');render();};});
['rsiDmin','rsiDmax','rsiMmin','rsiMmax','minVol','search','dayCandle','rangeSel'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{state.range=document.getElementById('rangeSel').value;render();}));
function resetFilters(){
  ['rsiDmin','rsiDmax','rsiMmin','rsiMmax','minVol','search'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('dayCandle').value='';document.getElementById('rangeSel').value='';state.range='';
  state.ema={};document.querySelectorAll('[data-ema]').forEach(c=>c.classList.remove('on'));
  state.sigs={};buildSigChips();render();
}
function num(id){const v=document.getElementById(id).value;return v===''?null:+v;}

function compute(){
  const act=activeStrats();
  const rsiDmin=num('rsiDmin'),rsiDmax=num('rsiDmax'),rsiMmin=num('rsiMmin'),rsiMmax=num('rsiMmax');
  const minVol=num('minVol'),dayC=document.getElementById('dayCandle').value,search=document.getElementById('search').value.trim().toUpperCase();
  const counts={}; STRATEGIES.forEach(s=>counts[s.id]=0);
  const out=[];
  for(const row of DATA.data){
    const g=(n)=>gv(row,n);
    for(const st of act){
      const res=st.run(g); if(!res) continue;
      if(state.sigs[res.signal]===false) continue;
      if(state.range && st.style==='Swing' && bucket(res.range)!==state.range) continue;
      const rd=g('RSI_Daily'),rm=g('RSI_Monthly');
      if(rsiDmin!=null&&!(rd>=rsiDmin))continue; if(rsiDmax!=null&&!(rd<=rsiDmax))continue;
      if(rsiMmin!=null&&!(rm>=rsiMmin))continue; if(rsiMmax!=null&&!(rm<=rsiMmax))continue;
      if(dayC&&String(g('Last_Day_Candle'))!==dayC)continue;
      if(minVol!=null&&!(+g('Avg_7D_Vol')>=minVol))continue;
      const ltp=+g('LTP');
      if(state.ema['50']&&!(ltp> +g('EMA_50')))continue;
      if(state.ema['200']&&!(ltp> +g('EMA_200')))continue;
      const sym=String(g('Symbol')||'');
      if(search&&sym.toUpperCase().indexOf(search)<0)continue;
      counts[st.id]++;
      out.push({sym:sym.replace('.NS',''),ltp:ltp,strat:st.name,style:st.style,signal:res.signal,ref:res.ref,gap:res.gap,range:res.range,rsiM:rm,rsiD:rd,dayCandle:g('Last_Day_Candle'),vol:g('Avg_7D_Vol')});
    }
  }
  for(const s of STRATEGIES){const e=document.getElementById('sc_'+s.id);if(e)e.textContent=counts[s.id]?('· '+counts[s.id]):'';}
  return out;
}

const COLDEFS=[{k:'sym',t:'Symbol'},{k:'ltp',t:'LTP'},{k:'strat',t:'Strategy'},{k:'signal',t:'Signal'},{k:'ref',t:'Level'},{k:'gap',t:'Gap %'},{k:'range',t:'Range %'},{k:'rsiM',t:'RSI M'},{k:'rsiD',t:'RSI D'},{k:'dayCandle',t:'Day candle'},{k:'vol',t:'Avg vol'}];
function buildHead(){const tr=document.getElementById('thead');tr.innerHTML='';COLDEFS.forEach(c=>{const th=document.createElement('th');th.textContent=c.t+(state.sortKey===c.k?(state.sortDir>0?' ▲':' ▼'):'');th.onclick=()=>{if(state.sortKey===c.k)state.sortDir*=-1;else{state.sortKey=c.k;state.sortDir=1;}render();};tr.appendChild(th);});}
function fmt(v){if(v==null||v===''||(typeof v==='number'&&!isFinite(v)))return'—';if(typeof v==='number')return(Math.round(v*100)/100).toLocaleString();return v;}
function tagClass(s){if(s==='Above High'||s==='Upper Breakout')return'high';if(s==='Above Close')return'close';if(s==='Lower Breakdown')return'down';return'zone';}

function renderCards(rows){
  const el=document.getElementById('cards');
  const sigs=activeSignals().slice(0,4);
  let h='<div class="card"><div class="n">'+rows.length+'</div><div class="l">Matches</div></div>';
  sigs.forEach(s=>{const n=rows.filter(r=>r.signal===s).length;h+='<div class="card"><div class="n">'+n+'</div><div class="l">'+s+'</div></div>';});
  el.style.gridTemplateColumns='repeat('+(sigs.length+1)+',1fr)';
  el.innerHTML=h;
}
function render(){
  let rows=compute();
  const sk=state.sortKey;
  rows.sort((a,b)=>{let x=a[sk],y=b[sk];
    if(sk==='signal'){x=SIG_ORDER[a.signal];y=SIG_ORDER[b.signal];}
    if(typeof x==='string'||typeof y==='string'){x=String(x);y=String(y);return x<y?-state.sortDir:x>y?state.sortDir:0;}
    return((x||0)-(y||0))*state.sortDir;});
  renderCards(rows);
  const tb=document.getElementById('tbody');
  if(rows.length===0){tb.innerHTML='<tr><td colspan="11"><div class="empty">No stocks match these filters.</div></td></tr>';return;}
  let h='';
  for(const r of rows.slice(0,500)){
    h+='<tr><td class="sym">'+r.sym+'</td><td>'+fmt(r.ltp)+'</td><td>'+r.strat+'</td>'+
      '<td><span class="tag '+tagClass(r.signal)+'">'+r.signal+'</span></td>'+
      '<td>'+fmt(r.ref)+'</td>'+
      '<td class="'+(r.gap>=0?'up':'down')+'">'+(r.gap==null?'—':(r.gap>=0?'+':'')+fmt(r.gap))+'</td>'+
      '<td>'+fmt(r.range)+'</td><td>'+fmt(r.rsiM)+'</td><td>'+fmt(r.rsiD)+'</td><td>'+fmt(r.dayCandle)+'</td><td>'+fmt(r.vol)+'</td></tr>';
  }
  if(rows.length>500)h+='<tr><td colspan="11"><div class="empty">showing first 500 of '+rows.length+'</div></td></tr>';
  tb.innerHTML=h;
}

document.getElementById('file').addEventListener('change',(e)=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=(ev)=>{const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});const hdr=aoa[0].map(x=>String(x).trim());
    const seen={},useIdx=[],useNames=[];hdr.forEach((h,i)=>{if(seen[h])return;seen[h]=1;useIdx.push(i);useNames.push(h);});
    const rows=aoa.slice(1).map(r=>useIdx.map(i=>r[i]!==undefined?r[i]:null));
    DATA={columns:useNames,data:rows};COLS=useNames;reindex();
    document.getElementById('status').innerHTML='loaded '+rows.length+' stocks from '+f.name;
    document.getElementById('srcnote').innerHTML='Live from your file: '+f.name;render();};
  rd.readAsArrayBuffer(f);
});
function useSample(){DATA=SAMPLE;COLS=SAMPLE.columns;reindex();
  document.getElementById('status').innerHTML='<span class="demoflag">sample data</span> '+DATA.data.length+' stocks';
  document.getElementById('srcnote').innerHTML='Showing embedded <b>sample</b>. Swing rectangles use real base data; positional Doji uses placeholder OHLC (prev-week/day columns arrive from your generator). Live <code>data.json</code> loads automatically once published.';render();}
async function loadRemote(manual){
  try{document.getElementById('status').textContent='fetching latest…';
    const res=await fetch(DATA_URL+'?t='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);
    const j=await res.json();if(!j.columns||!j.data)throw new Error('bad data');
    DATA={columns:j.columns,data:j.data};COLS=j.columns;reindex();
    document.getElementById('status').innerHTML='<span class="dot"></span> live '+DATA.data.length+' stocks'+(j.generated?(' • '+j.generated):'');
    document.getElementById('srcnote').innerHTML='Live data from GitHub'+(j.generated?(', generated '+j.generated):'')+'. Auto-refreshes every '+AUTO_REFRESH_MIN+' min.';render();
  }catch(e){if(manual)alert('Could not fetch live data ('+e.message+').');if(DATA===SAMPLE||!DATA)useSample();}
}
function init(){reindex();buildStyles();buildStratChips();buildSigChips();buildHead();toggleRange();useSample();loadRemote(false);setInterval(()=>loadRemote(false),AUTO_REFRESH_MIN*60*1000);}
init();
</script>
